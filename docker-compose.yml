services:
  dns-updater:
    build: .
    container_name: dns-updater
    ports:
      - "3010:3000"
    volumes:
      - ./data:/data
    restart: unless-stopped
    environment:
      - PORT=3000
    labels:
      - "com.docker.compose.project=dns-updater"
      - "com.centurylinklabs.watchtower.enable=false"
